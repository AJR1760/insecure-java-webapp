name: CI — Java & Container

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  detect-and-matrix:
    name: Detect build tool and prepare matrix
    runs-on: ubuntu-latest
    outputs:
      tool: ${{ steps.detect.outputs.tool }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect build tool
        id: detect
        run: |
          echo "tool=unknown" >> $GITHUB_OUTPUT
          if [ -f pom.xml ]; then echo "tool=maven" >> $GITHUB_OUTPUT; fi
          if [ -f build.gradle ] || [ -f build.gradle.kts ]; then echo "tool=gradle" >> $GITHUB_OUTPUT; fi

  build-and-test:
    name: Build & Test (matrix)
    needs: detect-and-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [11, 17]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: 'maven' # Gradle ignored automatically

      - name: Cache Gradle or Maven
        if: needs.detect-and-matrix.outputs.tool == 'gradle'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.java }}-${{ runner.os }}-${{ github.sha }}

      - name: Cache Maven
        if: needs.detect-and-matrix.outputs.tool == 'maven'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ matrix.java }}-${{ runner.os }}-${{ github.sha }}

      - name: Build (Maven)
        if: needs.detect-and-matrix.outputs.tool == 'maven'
        run: mvn -B -V -e -DskipTests=false clean verify

      - name: Build (Gradle)
        if: needs.detect-and-matrix.outputs.tool == 'gradle'
        run: |
          if [ -f gradlew ]; then ./gradlew build -x test; else gradle build -x test; fi

      - name: Run unit tests (Maven)
        if: needs.detect-and-matrix.outputs.tool == 'maven'
        run: mvn -B -V -e test

      - name: Run unit tests (Gradle)
        if: needs.detect-and-matrix.outputs.tool == 'gradle'
        run: |
          if [ -f gradlew ]; then ./gradlew test; else gradle test; fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.java }}
          path: |
            target/surefire-reports/**/*.xml
            build/test-results/**

      - name: Static analysis (example placeholders)
        run: |
          echo "Add SpotBugs/Checkstyle/PMD here. Example: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs" >&2

  docker-build:
    name: Build Docker image & run integration tests
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request' || github.base_ref == ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Run container (background) for integration tests
        run: |
          docker run -d --rm --name cicd_test -p 8080:8080 ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "app up"; break
            fi
            sleep 2
          done

      - name: Run container-based integration tests
        run: |
          echo "Run integration tests against http://localhost:8080"
          if [ -f pom.xml ]; then mvn -DskipUnitTests -Pintegration-test verify || true; fi
          # Customize integration test command as needed

      - name: Stop container
        run: docker stop cicd_test || true

      - name: Upload Docker image artifact (for downstream jobs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: built-image-tag
          path: |
            .
