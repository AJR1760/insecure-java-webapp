# CD — Build, push to ECR, register new ECS task definition revision (immutable image URI), update service
# Required repository secrets:
# - AWS_ACCESS_KEY_ID
# - AWS_SECRET_ACCESS_KEY
# - AWS_REGION
# - ECR_REGISTRY (e.g., <account>.dkr.ecr.<region>.amazonaws.com)
# - ECR_REPOSITORY
# - ECS_CLUSTER
# - ECS_SERVICE
# Recommended IAM permissions for the credentials used:
#  - ecr:BatchCheckLayerAvailability, ecr:GetAuthorizationToken, ecr:InitiateLayerUpload,
#    ecr:UploadLayerPart, ecr:CompleteLayerUpload, ecr:PutImage
#  - ecs:RegisterTaskDefinition, ecs:DescribeTaskDefinition, ecs:DescribeServices, ecs:UpdateService, ecs:DescribeClusters
#  - iam:PassRole (if the task definition references IAM roles)
name: CD — ECR push & ECS immutable deployment

on:
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: true
        default: production
  push:
    branches:
      - main

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_URI: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

jobs:
  build-and-push:
    name: Build and push image to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push with buildx
        id: image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
      - name: Output image uri
        run: echo "image_uri=${{ env.IMAGE_URI }}" >> $GITHUB_OUTPUT

  register-and-deploy:
    name: Register new task definition revision & update ECS service
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.deploy_environment || 'production' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get current task definition ARN from the service
        id: get_tdef
        run: |
          set -e
          TD_ARN=$(aws ecs describe-services --cluster "${{ secrets.ECS_CLUSTER }}" --services "${{ secrets.ECS_SERVICE }}" --query 'services[0].taskDefinition' --output text)
          echo "task_definition_arn=$TD_ARN" >> $GITHUB_OUTPUT

      - name: Describe current task definition and strip runtime-only fields
        id: build_new_td
        run: |
          set -e
          TD_ARN="${{ steps.get_tdef.outputs.task_definition_arn }}"
          aws ecs describe-task-definition --task-definition "$TD_ARN" --query 'taskDefinition' > td.json
          # Update container image(s) to the new IMAGE_URI, remove fields not accepted by register-task-definition
          NEW_IMAGE="${{ env.IMAGE_URI }}"
          cat td.json \
            | jq --arg new_image "$NEW_IMAGE" \
                '(.containerDefinitions[]?.image) |= ($new_image) |
                 del(.status, .revision, .taskDefinitionArn, .compatibilities, .registeredAt, .registeredBy, .requiresAttributes, .placementConstraints)'
            > new-td.json
          echo "new_td_file=new-td.json" >> $GITHUB_OUTPUT

      - name: Register new task definition
        id: register
        run: |
          set -e
          NEW_DEFINITION_ARN=$(aws ecs register-task-definition --cli-input-json file://new-td.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "new_task_definition_arn=$NEW_DEFINITION_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS service to use new task definition
        run: |
          set -e
          NEW_TD_ARN="${{ steps.register.outputs.new_task_definition_arn }}"
          echo "Updating service ${{ secrets.ECS_SERVICE }} to use $NEW_TD_ARN"
          aws ecs update-service --cluster "${{ secrets.ECS_CLUSTER }}" --service "${{ secrets.ECS_SERVICE }}" --task-definition "$NEW_TD_ARN"

      - name: Wait for service stable
        run: |
          aws ecs wait services-stable --cluster "${{ secrets.ECS_CLUSTER }}" --services "${{ secrets.ECS_SERVICE }}"
