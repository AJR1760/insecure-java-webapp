# Security — CodeQL, OWASP Dependency Check, gitleaks, OWASP ZAP, AuthN/AuthZ tests
name: Security — CodeQL & Scans

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 3 * * 1' # weekly on Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: codeql
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OWASP Dependency-Check (Maven)
        run: |
          if [ -f pom.xml ]; then
            mvn org.owasp:dependency-check-maven:check -Dformat=ALL || true
            mkdir -p dependency-check-report || true
            if [ -d target/dependency-check-report ]; then cp -r target/dependency-check-report dependency-check-report || true; fi
          else
            echo "No pom.xml found — skip Maven dependency-check (add Gradle support if needed)."
          fi

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report

  secret-scan-gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    needs: codeql
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          args: --redact --report-format json --report-path gitleaks-report.json || true

      - name: Upload gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  api-security-scan:
    name: API Security (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: [codeql]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app image (optional)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t api-scan:${{ github.sha }} .
          else
            echo "No Dockerfile - skipping image build"
            exit 0
          fi

      - name: Start app container
        run: |
          docker run -d --rm --name api_scan_app -p 8080:8080 api-scan:${{ github.sha }} || true
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "app up"; break
            fi
            sleep 2
          done

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm -v "$(pwd):/zap/wrk/:rw" -t owasp/zap2docker-stable zap-baseline.py -t http://host.docker.internal:8080 -r zap-report.html || true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

      - name: Stop app container
        run: docker stop api_scan_app || true

  authn-authz-tests:
    name: AuthN/AuthZ Integration Tests
    runs-on: ubuntu-latest
    needs: api-security-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start app for auth tests
        run: |
          if [ -f Dockerfile ]; then
            docker build -t auth-test-app:${{ github.sha }} .
            docker run -d --rm --name auth_test_app -p 8080:8080 auth-test-app:${{ github.sha }}
          else
            echo "No Dockerfile - starting local build not available"
          fi
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "app up"; break
            fi
            sleep 2
          done

      - name: Run AuthN/AuthZ test suite
        run: |
          if [ -f pom.xml ]; then
            mvn -Dtest=*Auth*,*Authn*,*Authz* test || true
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            if [ -f gradlew ]; then ./gradlew test --tests "*Auth*" || true; else gradle test --tests "*Auth*" || true; fi
          else
            echo "No Java build file found to run tests."
          fi

      - name: Stop app
        run: docker stop auth_test_app || true
